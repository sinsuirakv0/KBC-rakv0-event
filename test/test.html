<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>KBC EventData Downloader</title>
</head>
<body>

  <h2>EventData Downloader</h2>

  <label>国コード：</label>
  <select id="locale">
    <option value="ja">jp</option>
    <option value="en">en</option>
    <option value="kr">kr</option>
    <option value="tw">tw</option>
  </select>

  <br><br>

  <label>ファイル：</label>
  <select id="fileType">
    <option value="gatya">gatya.tsv</option>
    <option value="sale">sale.tsv</option>
    <option value="item">item.tsv</option>
  </select>

  <br><br>

  <button onclick="fetchData()">内容を表示</button>
  <button onclick="downloadTSV()">TSV をダウンロード</button>

  <pre id="output"></pre>
  <a id="dataLink" href="#" target="_blank" style="display:none;"></a>

  <script>
    let lastTSV = "";

    async function fetchData() {
      const type = document.getElementById("fileType").value;
      const locale = document.getElementById("locale").value;

      const res = await fetch(`/api/getData?type=${type}&locale=${locale}`);
      const text = await res.text();

      lastTSV = text;
      document.getElementById("output").textContent = text;

      const urlRes = await fetch(`/api/getData?type=${type}&locale=${locale}&urlOnly=1`);
      const realUrl = await urlRes.text();

      const link = document.getElementById("dataLink");
      link.href = realUrl;
      link.textContent = realUrl;
      link.style.display = "block";
    }

    function downloadTSV() {
      if (!lastTSV) return alert("先に内容を表示してください");

      const type = document.getElementById("fileType").value;
      const blob = new Blob([lastTSV], { type: "text/tab-separated-values" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = `${type}.tsv`;
      a.click();

      URL.revokeObjectURL(url);
    }
  </script>

</body>
</html>
