<script>
// =============================================
// ★ 現在のアプリバージョン設定
//    例: 150300 = ver.15.3.0
//    イベントの minVersion/maxVersion との比較に使用
// =============================================
const CURRENT_VERSION = 150300;

// =============================================
// 状態管理
// =============================================
let gatyaData = [];
let saleData  = [];
let itemData  = [];
let saleNames    = new Map(); // stageId -> 名前
let gatyaRNames  = new Map(); // gacha id -> 名前（レア: type 1）
let gatyaNNames  = new Map(); // gacha id -> 名前（ノーマル: type 0）
let gatyaENames  = new Map(); // gacha id -> 名前（イベント: type 4）

// =============================================
// 検索状態
// searchQuery: 現在のクエリ（空=全表示）
// activeTab:   現在表示中のタブ名
// suggestIdx:  キーボードナビ用インデックス
// =============================================
let searchQuery      = '';
let selectedUtcOffset = 'local'; // 'local' or number (e.g. 9 for UTC+9)

// =============================================
// オーバーレイ用エントリ保持
// エントリ全体をここに保存し index で参照する
// （onclick属性に大きなJSONを入れるのを避けるため）
// =============================================
let _overlayEntries = []; // [{ json: string, raw: string|null }]
let _currentJson    = null;
let _currentRaw     = null;

function storeOverlayEntry(entry) {
  // 同じエントリが複数回登録されるのを防ぐため raw をキーにキャッシュ
  const raw = entry.raw ?? null;
  const idx = _overlayEntries.findIndex(e => e.raw === raw && raw !== null);
  if (idx !== -1) return idx;
  _overlayEntries.push({
    json: JSON.stringify(entry, null, 2),
    raw,
  });
  return _overlayEntries.length - 1;
}

function toggleRawView(type) {
  const pre     = document.getElementById('overlay-raw-content');
  const content = type === 'json' ? _currentJson : _currentRaw;
  // 同じボタンを押したら閉じる
  if (pre.style.display !== 'none' && pre.dataset.type === type) {
    pre.style.display = 'none';
    return;
  }
  pre.textContent  = content ?? '（データなし）';
  pre.dataset.type = type;
  pre.style.display = 'block';
}
let activeTab   = 'gatya';
let suggestIdx  = -1;

// =============================================
// 定数
// =============================================
const WEEKDAY_JP = { Mon:'月', Tue:'火', Wed:'水', Thu:'木', Fri:'金', Sat:'土', Sun:'日' };
const DOW_JP     = ['日','月','火','水','木','金','土'];

// =============================================
// sale 非表示設定（常設イベントなど）
// デフォルトで非表示にしたいIDを設定する
// ranges: { from, to } の形式で範囲指定
// ids:    個別IDを指定
// =============================================
const SALE_HIDDEN_CONFIG = {
  ranges: [
    { from: -4, to: 999 },
    { from: 3000, to: 3008 },
    { from: 1000, to: 1006 },
    { from: 1008, to: 1032 },
    { from: 1036, to: 1039 },
    { from: 1043, to: 1064 },
    { from: 1073, to: 1077 },
    { from: 1083, to: 1112 },
    { from: 1130, to: 1138 },
    { from: 1150, to: 1152 },
    { from: 1165, to: 1172 },
    { from: 1175, to: 1181 },
    { from: 1184, to: 1187 },
    { from: 1192, to: 1199 },
    { from: 1214, to: 1217 },
    { from: 1226, to: 1250 },
    { from: 1255, to: 1259 },
    { from: 1265, to: 1281 },
    { from: 1312, to: 1314 },
    { from: 1333, to: 1335 },
    { from: 1338, to: 1340 },
    { from: 1345, to: 1348 },
    { from: 1350, to: 1358 },
    { from: 1393, to: 1395 },
    { from: 14000, to: 14051 },
    { from: 24015, to: 24018 },
    { from: 24028, to: 24033 },
    { from: 26000, to: 26018 },
    { from: 28000, to: 28568 },
    { from: 31000, to: 31003 },
    { from: 37000, to: 37011 },
  ],
  ids: [
     1066,1114,1117,1119,1122,1124,1128,1148,1157,1158,1161,1162,1189,1201,1203,1205,1207,1208,1209,1219,1220,1222,1296,1326,1342,1375,1376,1381,1383,1391,1404,1206,1416,1422,6000,12000,24021,24022,24023,24024,24025,24026,24039,24040,24043,24044,24046,24047,24050,24051,24055
  ],
};

// =============================================
// sale ステージタイプマップ
// IDの範囲からタイプ文字列とナンバーを生成
// URL: /api/stage-proxy?type=XX&num=NNN
// =============================================
const STAGE_TYPE_MAP = [
  { from:  1000, to:  1999, type: 'S'  },
  { from:  2000, to:  2999, type: 'C'  },
  { from:  4000, to:  4999, type: 'E'  },
  { from:  6000, to:  6999, type: 'T'  },
  { from:  7000, to:  7999, type: 'V'  },
  { from: 11000, to: 11999, type: 'R'  },
  { from: 12000, to: 12999, type: 'M'  },
  { from: 13000, to: 13999, type: 'NA' },
  { from: 14000, to: 14999, type: 'B'  },
  { from: 16000, to: 16999, type: 'D'  },
  { from: 24000, to: 24999, type: 'A'  },
  { from: 25000, to: 25999, type: 'H'  },
  { from: 27000, to: 27999, type: 'CA' },
  { from: 30000, to: 30999, type: 'DM' },
  { from: 31000, to: 31999, type: 'Q'  },
  { from: 33000, to: 33999, type: 'L'  },
  { from: 34000, to: 34999, type: 'ND' },
  { from: 36000, to: 36999, type: 'SR' },
  { from: 37000, to: 37999, type: 'G'  },
];

function getStageProxyUrl(id) {
  const entry = STAGE_TYPE_MAP.find(e => id >= e.from && id <= e.to);
  if (!entry) return null;
  const num = String(id - entry.from).padStart(3, '0');
  return `https://kbc-rakv0.vercel.app/api/stage-proxy?type=${entry.type}&num=${num}`;
}

// =============================================
// バージョンユーティリティ
// =============================================
function fmtVer(v) {
  const major = Math.floor(v / 10000);
  const minor = Math.floor((v % 10000) / 100);
  const patch = v % 100;
  return patch > 0 ? `${major}.${minor}.${patch}` : `${major}.${minor}`;
}

// バージョンが現在に対して有効か
// maxVersion < CURRENT_VERSION かつ 999999 以外 → 非表示
function isVersionVisible(header) {
  const max = Number(header.maxVersion);
  return max === 999999 || max >= CURRENT_VERSION;
}

// カード名に付けるバージョンバッジ HTML
function getVersionBadgeHtml(header) {
  const min = Number(header.minVersion);
  const max = Number(header.maxVersion);
  if (min > CURRENT_VERSION)
    return `<span class="ver-badge ver-need">(要v${fmtVer(min)})</span>`;
  if (max !== 999999)
    return `<span class="ver-badge ver-limit">(v${fmtVer(max)}まで)</span>`;
  return '';
}

// =============================================
// 常設判定: endDate が "20300101" のエントリを常設とみなす
// 常設は開催中タブでは非表示、予定・過去では通常表示
// =============================================
function isSteadyEntry(header) {
  return header.endDate === '20300101';
}

function isSaleHidden(id) {
  for (const r of SALE_HIDDEN_CONFIG.ranges) {
    if (id >= r.from && id <= r.to) return true;
  }
  return SALE_HIDDEN_CONFIG.ids.includes(id);
}

// =============================================
// ミッション判定
// 対象: 8000台, 9000台, 15000台, 17000台
// =============================================
function isMissionId(id) {
  return (id >= 8000  && id <= 8999)  ||
         (id >= 9000  && id <= 9999)  ||
         (id >= 15000 && id <= 15999) ||
         (id >= 17000 && id <= 17999);
}

// =============================================
// 時刻文字列パース
// "800" → "08:00", "1100" → "11:00", "0" → "00:00"
// =============================================
function parseTimeStr(t) {
  const s = String(t).padStart(4, '0');
  return `${s.slice(0,2)}:${s.slice(2,4)}`;
}

// 11:00かどうか（表示省略判定）
function isMidnight(t) {
  const s = String(t).padStart(4, '0');
  return s === '1100';
}

// =============================================
// ヘッダー日付パース → Date
// dateStr: "20260216", timeStr: "1100"
// =============================================
function parseDateTime(dateStr, timeStr) {
  const y   = parseInt(dateStr.slice(0, 4));
  const mon = parseInt(dateStr.slice(4, 6)) - 1;
  const d   = parseInt(dateStr.slice(6, 8));
  const s   = String(timeStr).padStart(4, '0');
  return new Date(y, mon, d, parseInt(s.slice(0,2)), parseInt(s.slice(2,4)));
}

// =============================================
// カード用期間文字列
// 例: "02/16〜03/03"  "02/16(11:00)〜03/03"
// 11:00は省略
// =============================================
function formatCardPeriod(dateStr, timeStr, eDateStr, eTimeStr) {
  const sm = dateStr.slice(4,6);
  const sd = dateStr.slice(6,8);
  const em = eDateStr.slice(4,6);
  const ed = eDateStr.slice(6,8);
  const st = isMidnight(timeStr)  ? '' : `(${parseTimeStr(timeStr)})`;
  const et = isMidnight(eTimeStr) ? '' : `(${parseTimeStr(eTimeStr)})`;
  return `${sm}/${sd}${st}〜${em}/${ed}${et}`;
}

// =============================================
// 詳細用日付文字列（曜日付き）
// 例: "2026/02/16(月) 11:00"
// =============================================
function formatDetailDate(dateStr, timeStr) {
  const dt  = parseDateTime(dateStr, timeStr);
  const y   = dt.getFullYear();
  const mon = String(dt.getMonth()+1).padStart(2,'0');
  const d   = String(dt.getDate()).padStart(2,'0');
  const dow = DOW_JP[dt.getDay()];
  const t   = parseTimeStr(timeStr);
  return `${y}/${mon}/${d}(${dow}) ${t}`;
}

// =============================================
// dateRanges の文字列パース
// "223 0" → 2月23日 00:00
// "1023 1100" → 10月23日 11:00
// =============================================
function parseDateRangePart(str) {
  const [datePart, timePart = '0'] = str.trim().split(' ');
  let month, day;
  if (datePart.length <= 3) {
    // 3桁: 先頭1桁=月, 残2桁=日
    month = parseInt(datePart[0]);
    day   = parseInt(datePart.slice(1));
  } else {
    // 4桁: 先頭2桁=月, 残2桁=日
    month = parseInt(datePart.slice(0,2));
    day   = parseInt(datePart.slice(2));
  }
  const timeStr = parseTimeStr(timePart);
  const midnight = isMidnight(timePart);
  return { month, day, timeStr, midnight };
}

// =============================================
// timeRanges → "08:00~10:00 & 12:00~14:00"
// =============================================
function formatTimeRanges(ranges) {
  return ranges.map(([s, e]) => `${parseTimeStr(s)}~${parseTimeStr(e)}`).join(' & ');
}

// =============================================
// 曜日配列 → "月・水・金"（短縮形）
// =============================================
function formatWeekdays(days) {
  return days.map(d => WEEKDAY_JP[d] || d).join('・');
}

// 曜日配列 → "月曜日・火曜日"（フル形）
const WEEKDAY_FULL = { Mon:'月曜日', Tue:'火曜日', Wed:'水曜日', Thu:'木曜日',
                       Fri:'金曜日', Sat:'土曜日', Sun:'日曜日' };
function formatWeekdaysFull(days) {
  return days.map(d => WEEKDAY_FULL[d] || d).join('・');
}

// =============================================
// 1つの timeBlock を人間が読める形に変換（改善版）
// =============================================
function formatTimeBlock(block) {
  const { dateRanges, monthDays, weekdays, timeRanges } = block;
  const hasTime = timeRanges && timeRanges.length > 0;
  const timeStr = hasTime ? formatTimeRanges(timeRanges) : '';
  const lines   = [];

  if (dateRanges && dateRanges.length > 0) {
    for (const dr of dateRanges) {
      const s = parseDateRangePart(dr.start);
      const e = parseDateRangePart(dr.end);
      const sStr = `${s.month}/${String(s.day).padStart(2,'0')}${s.midnight ? '' : ' ' + s.timeStr}`;
      const eStr = `${e.month}/${String(e.day).padStart(2,'0')}${e.midnight ? '' : ' ' + e.timeStr}`;
      lines.push(`${sStr}~${eStr}${hasTime ? ' ' + timeStr : ''}`);
    }
  }

  if (monthDays && monthDays.length > 0) {
    lines.push(`毎月${monthDays.join(',')}日${hasTime ? ' ' + timeStr : ''}`);
  }

  if (weekdays && weekdays.length > 0) {
    lines.push(`毎週 ${formatWeekdaysFull(weekdays)}${hasTime ? ' ' + timeStr : ''}`);
  }

  return lines.join('\n');
}

// =============================================
// 全 timeBlocks → 開催期間テキスト（改善版）
// header を渡すと常時開催に期間を表示
// =============================================
function formatTimeBlocks(blocks, header) {
  if (!blocks || blocks.length === 0) {
    if (header) {
      const s = formatDetailDate(header.startDate, header.startTime);
      const e = formatDetailDate(header.endDate,   header.endTime);
      return `期間内常時開催\n(${s} ~ ${e})`;
    }
    return '（常時開催）';
  }
  return blocks.map(formatTimeBlock).filter(Boolean).join('\n');
}

// =============================================
// 次の開催スロット計算
// =============================================
function parseDateRangeStr(str, refDate) {
  const { month, day, timeStr } = parseDateRangePart(str);
  const [hh, mm] = timeStr.split(':').map(Number);
  let year = refDate.getFullYear();
  let d    = new Date(year, month - 1, day, hh, mm, 0, 0);
  // 半年以上前なら翌年で試す
  if (d < refDate && (refDate - d) > 180 * 86400000)
    d = new Date(year + 1, month - 1, day, hh, mm, 0, 0);
  return d;
}

function setTimeHM(date, timeStr) {
  const s = String(timeStr).padStart(4, '0');
  date.setHours(parseInt(s.slice(0,2)), parseInt(s.slice(2,4)), 0, 0);
  return date;
}

function generateOccurrenceSlots(block, periodStart, periodEnd, now, searchTo) {
  const { dateRanges, monthDays, weekdays, timeRanges } = block;
  const hasTime    = timeRanges && timeRanges.length > 0;
  const slots      = [];
  const searchFrom = now > periodStart ? now : periodStart;
  const effEnd     = searchTo < periodEnd ? searchTo : periodEnd;

  if (dateRanges && dateRanges.length > 0) {
    for (const dr of dateRanges) {
      let rS = parseDateRangeStr(dr.start, searchFrom);
      let rE = parseDateRangeStr(dr.end,   searchFrom);
      if (rE <= rS) rE.setFullYear(rE.getFullYear() + 1);
      const eS = new Date(Math.max(rS.getTime(), periodStart.getTime()));
      const eE = new Date(Math.min(rE.getTime(), periodEnd.getTime()));
      if (eE <= eS) continue;
      if (hasTime) {
        let day = new Date(eS); day.setHours(0,0,0,0);
        while (day < eE) {
          for (const [ts, te] of timeRanges) {
            const sS = setTimeHM(new Date(day), ts);
            const sE = setTimeHM(new Date(day), te);
            if (sE > now && sS < eE)
              slots.push({ start: sS, end: sE, isCurrent: now >= sS && now < sE });
          }
          day.setDate(day.getDate() + 1);
        }
      } else {
        if (eE > now) slots.push({ start: eS, end: eE, isCurrent: now >= eS && now < eE });
      }
    }
  } else if (monthDays && monthDays.length > 0) {
    let day = new Date(searchFrom); day.setHours(0,0,0,0);
    while (day < effEnd) {
      if (monthDays.includes(day.getDate())) {
        if (hasTime) {
          for (const [ts, te] of timeRanges) {
            const sS = setTimeHM(new Date(day), ts);
            const sE = setTimeHM(new Date(day), te);
            if (sE > now && sS < periodEnd)
              slots.push({ start: sS, end: sE, isCurrent: now >= sS && now < sE });
          }
        } else {
          const sS = new Date(day);
          const sE = new Date(day); sE.setDate(sE.getDate() + 1);
          if (sE > now) slots.push({ start: sS, end: sE, isCurrent: now >= sS && now < sE });
        }
      }
      day.setDate(day.getDate() + 1);
    }
  } else if (weekdays && weekdays.length > 0) {
    const WD = { Sun:0, Mon:1, Tue:2, Wed:3, Thu:4, Fri:5, Sat:6 };
    const targets = weekdays.map(w => WD[w]).filter(n => n !== undefined);
    let day = new Date(searchFrom); day.setHours(0,0,0,0);
    while (day < effEnd) {
      if (targets.includes(day.getDay())) {
        if (hasTime) {
          for (const [ts, te] of timeRanges) {
            const sS = setTimeHM(new Date(day), ts);
            const sE = setTimeHM(new Date(day), te);
            if (sE > now && sS < periodEnd)
              slots.push({ start: sS, end: sE, isCurrent: now >= sS && now < sE });
          }
        } else {
          const sS = new Date(day);
          const sE = new Date(day); sE.setDate(sE.getDate() + 1);
          if (sE > now) slots.push({ start: sS, end: sE, isCurrent: now >= sS && now < sE });
        }
      }
      day.setDate(day.getDate() + 1);
    }
  }
  return slots;
}

function getNextOccurrences(header, timeBlocks, count = 5) {
  const now         = getAccurateDate();
  const periodStart = parseDateTime(header.startDate, header.startTime);
  const periodEnd   = parseDateTime(header.endDate,   header.endTime);
  if (periodEnd <= now) return [];

  if (!timeBlocks || timeBlocks.length === 0) {
    return [{ start: periodStart, end: periodEnd, isCurrent: now >= periodStart }];
  }

  const searchTo = new Date(Math.min(periodEnd.getTime(), now.getTime() + 90 * 86400000));
  const slots    = [];
  for (const block of timeBlocks) {
    slots.push(...generateOccurrenceSlots(block, periodStart, periodEnd, now, searchTo));
  }
  slots.sort((a, b) => a.start - b.start);

  const result = [];
  for (const s of slots) {
    if (result.length >= count) break;
    if (!result.some(r => r.start.getTime() === s.start.getTime())) result.push(s);
  }
  return result;
}

function formatOccurrences(header, timeBlocks) {
  const now   = getAccurateDate();
  const slots = getNextOccurrences(header, timeBlocks, 5);
  if (slots.length === 0) return '';

  const DOW = ['日','月','火','水','木','金','土'];
  const fmt  = d => `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}(${DOW[d.getDay()]}) ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  const fmtT = d => `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;

  return slots.map(({ start, end, isCurrent }) => {
    if (isCurrent) {
      const rem  = end - now;
      const h    = Math.floor(rem / 3600000);
      const m    = Math.floor((rem % 3600000) / 60000);
      return `<span class="occ-current">開催中 |${fmtT(end)}まで| (残り${h}時間${m}分)</span>`;
    }
    const diff = start - now;
    const days = Math.floor(diff / 86400000);
    const hrs  = Math.floor((diff % 86400000) / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    const label = days > 0 ? `${days}日と${hrs}時間${mins}分後` : hrs > 0 ? `${hrs}時間${mins}分後` : `${mins}分後`;
    return `${fmt(start)} ~ ${fmtT(end)} (${label})`;
  }).join('\n');
}

// =============================================
// CSV パース: id,名前
// =============================================
function parseCSV(text) {
  const map = new Map();
  for (const line of text.split('\n')) {
    const idx = line.indexOf(',');
    if (idx === -1) continue;
    const id   = parseInt(line.slice(0, idx).trim());
    const name = line.slice(idx + 1).trim();
    if (!isNaN(id) && name) map.set(id, name);
  }
  return map;
}

// =============================================
// フィルタリング & ソート
// =============================================
function filterAndSort(events) {
  const now         = new Date();
  const showCurrent = document.getElementById('showCurrent').checked;
  const showPast    = document.getElementById('showPast').checked;
  const sortByDate  = document.getElementById('sortByDate').checked;

  const filtered = events.filter(e => {
    const isPast    = e.end   <= now;
    const isCurrent = e.start <= now && e.end > now;
    const isFuture  = e.start >  now;
    const isSteady  = e.detail?.steady ?? false; // 常設フラグ

    // 検索クエリがあればID/名前でフィルタ
    if (searchQuery) {
      const q       = searchQuery.toLowerCase();
      const idMatch = String(e.detail?.id ?? '').includes(q);
      const nmMatch = (e.name ?? '').toLowerCase().includes(q);
      if (!idMatch && !nmMatch) return false;
    }

    // 常設（endDate=20300101）は開催中では表示しない
    // 「常設を含む全イベントを表示」がONのときは例外
    const showAll = document.getElementById('showAllSale').checked;
    if (isSteady && isCurrent && !showAll) return false;

    if (showPast)  return true;
    if (isPast)    return false;
    if (isCurrent) return showCurrent;
    if (isFuture)  return true;
    return false;
  });

  const sortById = document.getElementById('sortById').checked;
  if (sortByDate) filtered.sort((a, b) => a.start - b.start);
  else if (sortById) filtered.sort((a, b) => (a.detail?.id ?? 0) - (b.detail?.id ?? 0));
  return filtered;
}

// =============================================
// カード HTML 生成（新レイアウト）
// クリックで openOverlay(detail) を呼ぶ
// =============================================
function makeCard(period, name, isCurrent, isPast, detail) {
  const tagClass = isPast ? 'tag-past' : isCurrent ? 'tag-current' : 'tag-future';
  const tagLabel = isPast ? '終了'     : isCurrent ? '開催中'     : '予定';
  const dataAttr = encodeURIComponent(JSON.stringify(detail));
  return `
    <div class="event-card ${isCurrent ? 'is-current' : ''}"
         onclick="openOverlay(decodeURIComponent('${dataAttr}'))">
      <span class="card-tag ${tagClass}">${tagLabel}</span>
      <div class="card-body">
        <span class="card-period">${period}</span>　<span class="card-name">${name}</span>
      </div>
      <span class="card-arrow">›</span>
    </div>`;
}

// =============================================
// sale/mission エントリ → イベント配列に展開
// stageIds を1つずつ別オブジェクトに分割
// missionOnly: true=ミッションのみ, false=ミッション除外
// =============================================
function expandSaleEntry(entry, missionOnly) {
  // バージョンフィルタ: maxVersion < CURRENT_VERSION かつ 999999 以外は非表示
  if (!isVersionVisible(entry.header)) return [];

  const now      = new Date();
  const entryIdx = storeOverlayEntry(entry); // エントリ全体を保持
  const result   = [];
  for (const id of (entry.stageIds || [])) {
    const isMission = isMissionId(id);
    if (missionOnly !== isMission) continue;

    // sale タブ: 非表示設定IDはチェックなければスキップ
    if (!missionOnly && !document.getElementById('showAllSale').checked && isSaleHidden(id)) continue;

    const start   = parseDateTime(entry.header.startDate, entry.header.startTime);
    const end     = parseDateTime(entry.header.endDate,   entry.header.endTime);
    const baseName   = saleNames.get(id) ?? `ID:${id}`;
    const verBadge   = getVersionBadgeHtml(entry.header);
    const name       = verBadge ? `${baseName}${verBadge}` : baseName;
    const period  = formatCardPeriod(
      entry.header.startDate, entry.header.startTime,
      entry.header.endDate,   entry.header.endTime
    );
    // 詳細データ
    const detail = {
      name,
      id,
      period: `${formatDetailDate(entry.header.startDate, entry.header.startTime)} ~ ${formatDetailDate(entry.header.endDate, entry.header.endTime)}`,
      ver:    `${entry.header.minVersion}~${entry.header.maxVersion}`,
      schedule: formatTimeBlocks(entry.timeBlocks, entry.header),
      stageProxyUrl: getStageProxyUrl(id),
      steady: isSteadyEntry(entry.header), // 常設フラグ
      _entryIdx: entryIdx,
    };
    result.push({ start, end, name, period, detail });
  }
  return result;
}

        <div class="overlay-value">${d.period}</div>
      </div>

        <iframe

    const entryObjOcc  = entryForOcc ? JSON.parse(entryForOcc.json) : null;
    if (entryObjOcc?.header && entryObjOcc?.timeBlocks !== undefined) {
      const occHtml = formatOccurrences(entryObjOcc.header, entryObjOcc.timeBlocks);
      if (occHtml) {

        <div class="overlay-label">次の開催</div>
        <div class="overlay-value occ-list">${occHtml}</div>
      </div>`;
      }

  // エントリデータをセット（生データ・JSONボタン用）
  const entryData  = _overlayEntries[d._entryIdx] ?? null;
  _currentJson     = entryData?.json ?? null;
  _currentRaw      = entryData?.raw  ?? null;

  // ボタンと表示エリアを末尾に追加
  const hasData = _currentJson || _currentRaw;
  if (hasData) {

}

// =============================================
// iframe ロードハンドラ
// クロスオリジンで正常なら loading を非表示
// アクセス拒否(X-Frame-Options)などは wrap を削除
// =============================================
function handleIframeLoad(iframe) {
  try {
    const doc = iframe.contentDocument;
    if (doc && doc.body && doc.body.innerHTML.trim() === '') {
      document.getElementById('overlay-iframe-wrap')?.remove();
      return;
    }
  } catch(e) {
    // SecurityError = クロスオリジンで正常読み込み → loading非表示
  }
  const loading = document.getElementById('overlay-iframe-loading');
  if (loading) loading.style.display = 'none';
}

function handleIframeError(iframe) {
  document.getElementById('overlay-iframe-wrap')?.remove();
}

function closeOverlay() {
  document.body.classList.remove('overlay-open');
  document.getElementById('overlay').classList.remove('show');
}

// =============================================
// 汎用: イベント配列からカードHTML生成
// =============================================
function buildCards(events) {
  const now = new Date();
  return events.map(e => {
    const isCurrent = e.start <= now && e.end > now;
    const isPast    = e.end   <= now;
    return makeCard(e.period, e.name, isCurrent, isPast, e.detail);
  }).join('');
}

// =============================================
// flags → ラベル変換
// =============================================
const FLAGS_LABEL = {
  4:     '【step up】',
  20600: '＋福引＆かけら',
  16384: '＋かけら',
  4216:  '＋福引',
};

// =============================================
// rates → 表示テキスト（0は非表示）
// =============================================
const RATE_LABELS = [
  ['normal',     'ノーマル'],
  ['rare',       'レア'],
  ['superRare',  '激レア'],
  ['uberRare',   '超激レア'],
  ['legendRare', '伝説レア'],
];
function formatRates(rates) {
  return RATE_LABELS
    .filter(([k]) => (rates[k] ?? 0) > 0)
    .map(([k, label]) => `${label}: ${(rates[k] / 100).toFixed(2)}%`)
    .join('\n');
}

// =============================================
// ガチャタイプ → サブタブID
// =============================================
function gachaTypeToSub(t) {
  if (t === 0) return 'normal';
  if (t === 4) return 'event';
  return 'rare'; // 1 and others
}

// =============================================
// ガチャタブ描画
// type 0: ノーマル, 1: レア, 4: イベント
// type 2, 3: 非表示
// セクションヘッダーで区切って1ページに表示
// =============================================
function renderGatya() {
  const cont = document.getElementById('gatya');

  const buckets = { normal: [], rare: [], event: [] };

  for (const entry of gatyaData) {
    const h    = entry.header;
    const type = h.gachaType;

    if (type === 2 || type === 3) continue;
    // バージョンフィルタ
    if (!isVersionVisible(h)) continue;

    const sub      = gachaTypeToSub(type);
    const start    = parseDateTime(h.startDate, h.startTime);
    const end      = parseDateTime(h.endDate,   h.endTime);
    const entryIdx = storeOverlayEntry(entry); // エントリ全体を保持

    for (const g of (entry.gachas || [])) {
      // type に応じて異なるCSVから名前を取得
      const nameMap = type === 0 ? gatyaNNames : type === 4 ? gatyaENames : gatyaRNames;
      const csvName   = nameMap.get(g.id);
      const flagLabel = FLAGS_LABEL[g.flags] || '';
      const guarLabel = g.guaranteed ? '＜確定＞' : '';
      const verBadge  = getVersionBadgeHtml(h);
      const nameParts = [csvName ?? `ID:${g.id}`, guarLabel, flagLabel].filter(Boolean);
      if (verBadge) nameParts.push(verBadge);
      const period    = formatCardPeriod(h.startDate, h.startTime, h.endDate, h.endTime);
      const rateText  = formatRates(g.rates || {});
      const msgText   = (g.message && g.message !== '0') ? g.message : '';

      // type別に公式URLを生成
      let infoUrl = null;
      if (type === 1)      infoUrl = `https://ponosgames.com/information/appli/battlecats/gacha/rare/R${g.id}.html`;
      else if (type === 4) infoUrl = `https://ponosgames.com/information/appli/battlecats/gacha/event/E${g.id}.html`;
      else if (type === 0) infoUrl = `https://ponosgames.com/information/appli/battlecats/gacha/normal/N${g.id}.html`;

      const detail = {
        type: 'gatya',
        name: csvName ?? `ID:${g.id}`,
        id:   g.id,
        period: `${formatDetailDate(h.startDate, h.startTime)} ~ ${formatDetailDate(h.endDate, h.endTime)}`,
        ver:    `${h.minVersion}~${h.maxVersion}`,
        gachaCount: h.gachaCount,
        rates:   rateText,
        message: msgText,
        guaranteed: g.guaranteed,
        flagLabel,
        infoUrl,
        steady: isSteadyEntry(h),  // 常設フラグ
        _entryIdx: entryIdx,
      };

      buckets[sub].push({ start, end, name: nameParts.join(' '), period, detail });
    }
  }

  const sections = [
    { key: 'normal', label: 'ノーマル' },
    { key: 'rare',   label: 'レア' },
    { key: 'event',  label: 'イベント' },
  ];

  let html = '';
  let totalCount = 0;

  for (const { key, label } of sections) {
    const filtered = filterAndSort(buckets[key]);
    if (filtered.length === 0) continue;
    totalCount += filtered.length;
    html += `
      <div class="gatya-section">
        <div class="gatya-section-header">${label}</div>
        ${buildCards(filtered)}
      </div>`;
  }

  if (html === '') {
    cont.innerHTML = '<div class="empty">🐈 表示するガチャイベントがありません</div>';
  } else {
    cont.innerHTML = `<div class="count-label">${totalCount} 件</div>` + html;
  }
}

async function loadData() {
  try {
    const BASE = 'https://raw.githubusercontent.com/sinsuirakv0/KBC-rakv0-event/main/data';
    const [gatyaRes, saleRes, itemRes, saleNameRes, gatyaNameRes, gatyaNNameRes, gatyaENameRes] = await Promise.all([
      fetch(`${BASE}/gatya.json`),
      fetch(`${BASE}/sale.json`),
      fetch(`${BASE}/item.json`),
      fetch(`${BASE}/sale_name.csv`),
      fetch(`${BASE}/gatya_name.csv`),
      fetch(`${BASE}/gatya_n_name.csv`),
      fetch(`${BASE}/gatya_e_name.csv`),
    ]);

    _overlayEntries = []; // エントリキャッシュをリセット
    const gatyaJson = await gatyaRes.json();
    const saleJson  = await saleRes.json();
    const itemJson  = await itemRes.json();

    // { updatedAt, data } 形式に対応（旧フォーマットの配列もフォールバック）
    gatyaData = Array.isArray(gatyaJson) ? gatyaJson : (gatyaJson.data ?? []);
    saleData  = Array.isArray(saleJson)  ? saleJson  : (saleJson.data  ?? []);
    itemData  = Array.isArray(itemJson)  ? itemJson  : (itemJson.data  ?? []);

    const gatyaUpdatedAt = gatyaJson.updatedAt ?? null;
    const saleUpdatedAt  = saleJson.updatedAt  ?? null;
    const itemUpdatedAt  = itemJson.updatedAt  ?? null;

    const saleNameText   = await saleNameRes.text();
    saleNames = parseCSV(saleNameText);

    const gatyaNameText  = await gatyaNameRes.text().catch(() => '');
    const gatyaNNameText = await gatyaNNameRes.text().catch(() => '');
    const gatyaENameText = await gatyaENameRes.text().catch(() => '');
    gatyaRNames = parseCSV(gatyaNameText);   // レア (type 1)
    gatyaNNames = parseCSV(gatyaNNameText);  // ノーマル (type 0)
    gatyaENames = parseCSV(gatyaENameText);  // イベント (type 4)

    // updatedAt 表示（Last-Modified の代わりに JSON 内のタイムスタンプを使用）
    updateLastModified(gatyaUpdatedAt, saleUpdatedAt, itemUpdatedAt);

    renderAll();
  } catch (err) {
    console.error('データ読み込みエラー:', err);
    document.querySelectorAll('.loading').forEach(el => {
      el.textContent = 'データの読み込みに失敗しました: ' + err.message;
    });
  }
}

// =============================================
// 最終更新時刻表示
// gatya と sale の Last-Modified ヘッダを取得して表示
// 同じ時刻 → "(gatya&sale)"、異なる → 新しい方のみ表示
// =============================================
// =============================================
// 最終更新時刻表示
// gatya / sale / item それぞれ独立して表示
// 折りたたみ: ▶閉じ / ▼開き
// 日付フォーマット: YY/MM/DD HH:MM:SS
// =============================================
function formatDateShort(date) {
  const y   = String(date.getFullYear()).slice(2); // 西暦2桁
  const mon = String(date.getMonth()+1).padStart(2,'0');
  const d   = String(date.getDate()).padStart(2,'0');
  const h   = String(date.getHours()).padStart(2,'0');
  const min = String(date.getMinutes()).padStart(2,'0');
  const sec = String(date.getSeconds()).padStart(2,'0');
  return `${y}/${mon}/${d} ${h}:${min}:${sec}`;
}

// entries: gatya/sale/item それぞれの Last-Modified を独立表示
function updateLastModified(gatyaAt, saleAt, itemAt) {
  const sources = [
    { label: 'gatya', mod: gatyaAt },
    { label: 'sale',  mod: saleAt  },
    { label: 'item',  mod: itemAt  },
  ];
  const valid = sources.filter(s => s.mod);
  const detail = document.getElementById('lastmod-detail');
  if (valid.length === 0) { detail.innerHTML = ''; return; }

  // 各行: "YY/MM/DD HH:MM:SS(label)"
  detail.innerHTML = valid
    .map(s => `${s.mod}(${s.label})`)
    .join('<br>');
}

// =============================================
// 検索: 現在のタブのアイテムを収集
// =============================================
function collectTabItems() {
  const items = [];
  const seen  = new Set();

  if (activeTab === 'gatya') {
    for (const entry of gatyaData) {
      const type    = entry.header?.gachaType ?? 1;
      const nameMap = type === 0 ? gatyaNNames : type === 4 ? gatyaENames : gatyaRNames;
      for (const g of (entry.gachas || [])) {
        const key  = g.id;
        if (seen.has(key)) continue;
        seen.add(key);
        const name = nameMap.get(g.id) ?? `ID:${g.id}`;
        items.push({ id: g.id, name });
      }
    }
  } else if (activeTab === 'sale') {
    for (const entry of saleData) {
      for (const id of (entry.stageIds || [])) {
        if (seen.has(id)) continue;
        seen.add(id);
        const name = saleNames.get(id) ?? `ID:${id}`;
        items.push({ id, name });
      }
    }
  }
  // item / mission はプレースホルダーのため検索対象外

  return items;
}

// 候補を最大15件表示
function showSuggestions(q) {
  const box = document.getElementById('search-suggestions');
  if (!q) { box.style.display = 'none'; return; }

  const lower = q.toLowerCase();
  const hits  = collectTabItems().filter(it =>
    String(it.id).includes(lower) || it.name.toLowerCase().includes(lower)
  ).slice(0, 15);

  if (hits.length === 0) { box.style.display = 'none'; return; }

  suggestIdx = -1;
  box.innerHTML = hits.map((it, i) =>
    `<div class="suggestion-item" data-idx="${i}"
          onmousedown="selectSuggestion(${JSON.stringify(it.name)})">
       <span style="opacity:.55;margin-right:6px;">${it.id}</span>${it.name}
     </div>`
  ).join('');
  box.style.display = 'block';
}

function closeSuggestions() {
  document.getElementById('search-suggestions').style.display = 'none';
  suggestIdx = -1;
}

// 候補を確定してカードを絞り込む
function selectSuggestion(name) {
  document.getElementById('searchInput').value = name;
  searchQuery = name;
  closeSuggestions();
  renderAll();
}

// 入力のたびに候補更新 & リアルタイム絞り込み
function onSearchInput() {
  const q   = document.getElementById('searchInput').value.trim();
  searchQuery = q;
  suggestIdx  = -1;
  showSuggestions(q);
  renderAll();
}

// ↑↓で候補ナビ、Enterで確定、Escで閉じる
function onSearchKeydown(e) {
  const box   = document.getElementById('search-suggestions');
  const items = box.querySelectorAll('.suggestion-item');
  if (!items.length) return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    suggestIdx = Math.min(suggestIdx + 1, items.length - 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    suggestIdx = Math.max(suggestIdx - 1, -1);
  } else if (e.key === 'Enter') {
    if (suggestIdx >= 0) items[suggestIdx].dispatchEvent(new Event('mousedown'));
    closeSuggestions();
    return;
  } else if (e.key === 'Escape') {
    closeSuggestions();
    return;
  }
  // アクティブスタイル更新
  items.forEach((el, i) => el.classList.toggle('active', i === suggestIdx));
}

// 折りたたみトグル
function toggleLastmod() {
  const detail = document.getElementById('lastmod-detail');
  const toggle = document.getElementById('lastmod-toggle');
  const isOpen = detail.style.display !== 'none';
  detail.style.display = isOpen ? 'none' : 'block';
  toggle.textContent = isOpen ? '前回の更新時間を表示▶' : '前回の更新時間を表示▼';
}


// =============================================
// 現在時刻表示
// =============================================
let offset = 0;

// 遅延補正付きで正確な時刻を取得
async function syncAccurateTime() {
  const t0 = Date.now(); // リクエスト送信時刻

  const res = await fetch("https://worldtimeapi.org/api/timezone/Asia/Tokyo");
  const t1 = Date.now(); // レスポンス受信時刻

  const data = await res.json();
  const serverTime = new Date(data.datetime).getTime();

  const rtt = t1 - t0;          // 往復遅延
  const oneWayDelay = rtt / 2;  // 片道遅延（推定）

  const correctedServerTime = serverTime + oneWayDelay;

  // offset を更新（表示は止めない）
  offset = correctedServerTime - Date.now();
}

// 補正後の正確な現在時刻
function getAccurateDate() {
  return new Date(Date.now() + offset);
}

// yyyy/mm/dd hh:mm:ss
function formatDate(date) {
  const y   = date.getFullYear();
  const mon = String(date.getMonth()+1).padStart(2,'0');
  const d   = String(date.getDate()).padStart(2,'0');
  const h   = String(date.getHours()).padStart(2,'0');
  const min = String(date.getMinutes()).padStart(2,'0');
  const sec = String(date.getSeconds()).padStart(2,'0');
  return `${y}/${mon}/${d} ${h}:${min}:${sec}`;
}

// 表示更新（1秒ごとに必ず進む）
function updateNow() {
  let displayStr;
  if (selectedUtcOffset === 'local') {
    displayStr = '現在: ' + formatDate(getAccurateDate());
  } else {
    const label = selectedUtcOffset >= 0 ? `(UTC+${selectedUtcOffset})` : `(UTC${selectedUtcOffset})`;
    displayStr  = `現在: ${label}${formatDateUtc(getDisplayDate())}`;
  }
  document.getElementById('now-display').textContent = displayStr;
}

// =============================================
// ハンバーガーメニュー
// =============================================
function toggleHamburger() {
  const m = document.getElementById('hamburger-menu');
  m.style.display = m.style.display === 'none' || m.style.display === '' ? 'block' : 'none';
}

// UTC セレクターを初期化（-12～+14）
function initUtcSelect() {
  const sel = document.getElementById('utc-select');
  for (let u = -12; u <= 14; u++) {
    const opt = document.createElement('option');
    opt.value = u;
    opt.textContent = u >= 0 ? `UTC+${u}` : `UTC${u}`;
    if (u === 9) opt.textContent += ' (JST)';
    sel.appendChild(opt);
  }
}

function onUtcChange(val) {
  selectedUtcOffset = val === 'local' ? 'local' : parseInt(val);
  updateNow();
}

// UTC オフセット適用済みの表示用 Date を生成
function getDisplayDate() {
  const accurateMs = Date.now() + offset;
  if (selectedUtcOffset === 'local') return new Date(accurateMs);
  // ローカル → UTC → 目標オフセット
  const utcMs = accurateMs + new Date().getTimezoneOffset() * 60000;
  return new Date(utcMs + selectedUtcOffset * 3600000);
}

// UTC オフセット表示時刻のフォーマット（UTC メソッドで読む）
function formatDateUtc(d) {
  const y   = d.getUTCFullYear();
  const mon = String(d.getUTCMonth()+1).padStart(2,'0');
  const day = String(d.getUTCDate()).padStart(2,'0');
  const h   = String(d.getUTCHours()).padStart(2,'0');
  const min = String(d.getUTCMinutes()).padStart(2,'0');
  const sec = String(d.getUTCSeconds()).padStart(2,'0');
  return `${y}/${mon}/${day} ${h}:${min}:${sec}`;
}

// 初期化して1秒ごとに更新
async function startClock() {
  initUtcSelect();
  await syncAccurateTime(); // 初回同期
  updateNow();

  // 秒を進めるループ（絶対に止まらない）
  setInterval(updateNow, 1000);

  // 5分ごとに裏で再同期（表示は止めない）
  setInterval(syncAccurateTime, 5 * 60 * 1000);
}

startClock();

// イベントリスナー登録
// =============================================
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => showTab(tab.dataset.tab));

document.getElementById('sortById').addEventListener('change', function() {

document.getElementById('showAllSale').addEventListener('change', renderAll);
document.getElementById('overlay-close').addEventListener('click', closeOverlay);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeOverlay();
});

// 初期化
updateNow();
setInterval(updateNow, 1000);
loadData();
