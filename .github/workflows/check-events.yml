name: Check Events

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force update targets (gatya sale item). Leave empty for normal check."
        required: false
        default: ""

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Node.js
        run: node --version

      - name: Prepare JWT cache key
        id: jwt-cache-key
        shell: bash
        run: echo "bucket=$(($(date -u +%s) / 43200))" >> "$GITHUB_OUTPUT"

      - name: Restore JWT cache
        id: jwt-cache
        uses: actions/cache/restore@v4
        with:
          path: .cache/ponos-jwt.json
          key: ponos-jwt-v1-${{ runner.os }}-${{ steps.jwt-cache-key.outputs.bucket }}

      - name: Run normal check
        if: ${{ github.event.inputs.force == '' }}
        run: node scripts/run.js
        env:
          GH_TOKEN_EVENT: ${{ secrets.GH_TOKEN_EVENT }}
          PRIVATE_REPO_OWNER: ${{ secrets.PRIVATE_REPO_OWNER }}
          PRIVATE_REPO_NAME: ${{ secrets.PRIVATE_REPO_NAME }}
          GITHUB_PRIVATE_TOKEN: ${{ secrets.GITHUB_PRIVATE_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BOT_EVENT_UPDATE_URL: ${{ secrets.BOT_EVENT_UPDATE_URL }}
          BOT_EVENT_UPDATE_SECRET: ${{ secrets.BOT_EVENT_UPDATE_SECRET }}
          EVENT_SITE_URL: ${{ vars.EVENT_SITE_URL }}
          PONOS_JWT_CACHE_FILE: .cache/ponos-jwt.json
          EVENT_CHECK_DURATION_MS: 85000
          EVENT_CHECK_INTERVAL_MS: 2000

      - name: Run force update
        if: ${{ github.event.inputs.force != '' }}
        run: node scripts/run.js --force
        env:
          FORCE_TARGETS: ${{ github.event.inputs.force }}
          GH_TOKEN_EVENT: ${{ secrets.GH_TOKEN_EVENT }}
          PRIVATE_REPO_OWNER: ${{ secrets.PRIVATE_REPO_OWNER }}
          PRIVATE_REPO_NAME: ${{ secrets.PRIVATE_REPO_NAME }}
          GITHUB_PRIVATE_TOKEN: ${{ secrets.GITHUB_PRIVATE_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BOT_EVENT_UPDATE_URL: ${{ secrets.BOT_EVENT_UPDATE_URL }}
          BOT_EVENT_UPDATE_SECRET: ${{ secrets.BOT_EVENT_UPDATE_SECRET }}
          EVENT_SITE_URL: ${{ vars.EVENT_SITE_URL }}
          PONOS_JWT_CACHE_FILE: .cache/ponos-jwt.json

      - name: Save JWT cache
        if: ${{ always() && steps.jwt-cache.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: .cache/ponos-jwt.json
          key: ponos-jwt-v1-${{ runner.os }}-${{ steps.jwt-cache-key.outputs.bucket }}
