name: Check Events

on:
  workflow_dispatch:
    inputs:
      force:
        description: "強制更新するファイル（例: gatya sale item / 空欄で全部）"
        required: false
        default: ""

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: 通常実行
        if: ${{ github.event.inputs.force == '' }}
        run: node scripts/run.js
        env:
          GH_TOKEN_EVENT: ${{ secrets.GH_TOKEN_EVENT }}
          PRIVATE_REPO_OWNER: ${{ secrets.PRIVATE_REPO_OWNER }}
          PRIVATE_REPO_NAME: ${{ secrets.PRIVATE_REPO_NAME }}
          GITHUB_PRIVATE_TOKEN: ${{ secrets.GITHUB_PRIVATE_TOKEN }}

      - name: 強制更新
        if: ${{ github.event.inputs.force != '' }}
        run: node scripts/run.js --force ${{ github.event.inputs.force }}
        env:
          GH_TOKEN_EVENT: ${{ secrets.GH_TOKEN_EVENT }}
          PRIVATE_REPO_OWNER: ${{ secrets.PRIVATE_REPO_OWNER }}
          PRIVATE_REPO_NAME: ${{ secrets.PRIVATE_REPO_NAME }}
          GITHUB_PRIVATE_TOKEN: ${{ secrets.GITHUB_PRIVATE_TOKEN }}
